<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - MedicPulse</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .time-slot {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.9rem;
        }

        .time-slot:hover {
            border-color: var(--primary-color);
            background-color: var(--primary-light);
            color: var(--primary-color);
        }

        .time-slot.selected {
            background-color: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
            font-size: 0.9rem;
        }

        .input-group input,
        .input-group select {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: #fdfdfd;
            box-sizing: border-box;
        }

        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: var(--primary-color);
            background: white;
        }

        .login-btn {
            background: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
            width: 100%;
        }

        .login-btn:hover {
            background: var(--primary-dark, #004494);
            transform: translateY(-2px);
        }

        /* --- ENHANCED UI/UX STYLES --- */
        /* Global Animations */
        html {
            scroll-behavior: smooth;
        }

        .content-area {
            animation: fadeSlideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(15px);
        }

        @keyframes fadeSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Card Elevations */
        .card {
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.1) !important;
        }

        /* Time slot selection animation enhancement */
        .time-slot {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s, color 0.3s, border-color 0.3s, box-shadow 0.3s;
        }

        .time-slot:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .time-slot.selected {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(0, 86, 179, 0.3);
        }

        /* Button Ripple & Loading State */
        button {
            position: relative;
            overflow: hidden;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            transform: scale(0);
            animation: ripple-effect 0.6s linear;
            background-color: rgba(255, 255, 255, 0.4);
        }

        @keyframes ripple-effect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .btn-loading {
            color: transparent !important;
            pointer-events: none;
        }

        .btn-loading::after {
            content: "";
            position: absolute;
            width: 20px;
            height: 20px;
            top: 50%;
            left: 50%;
            margin-top: -10px;
            margin-left: -10px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Micro Interactions */
        .sidebar-menu li a {
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .sidebar-menu li a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: rgba(255, 255, 255, 0.1);
            transition: width 0.3s ease;
            z-index: -1;
        }

        .sidebar-menu li a:hover::before,
        .sidebar-menu li a.active::before {
            width: 100%;
        }

        .sidebar-menu li a.active {
            border-left: 4px solid white;
            background: rgba(255, 255, 255, 0.1);
        }

        .user-profile {
            transition: transform 0.2s ease;
            cursor: pointer;
            display: inline-block;
        }

        .user-profile:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>MedicPulse</h2>
            </div>
            <ul class="sidebar-menu">
                <li><a href="patient_dashboard.html"><i class="fas fa-home"></i> <span>Dashboard</span></a></li>
                <li><a href="appointment.html" class="active"><i class="fas fa-calendar-plus"></i> <span>Book
                            Appointment</span></a></li>
                <li><a href="my_appointments.html"><i class="fas fa-calendar-check"></i> <span>My
                            Appointments</span></a></li>
                <li><a href="visit_history.html"><i class="fas fa-history"></i> <span>Visit History</span></a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> <span>Profile</span></a></li>
            </ul>
        </div>

        <div class="main-wrapper">
            <nav class="navbar">
                <div class="nav-left">
                    <span class="system-name">Appointment Booking</span>
                </div>
                <div class="nav-right">
                    <div class="user-profile">
                        <span class="user-name">John Doe</span>
                    </div>
                    <a href="login.html" class="logout-btn">Logout</a>
                </div>
            </nav>

            <main class="content-area">
                <div class="page-header">
                    <h1>Book a New Appointment</h1>
                    <p>Find a doctor and schedule your visit in seconds.</p>
                </div>

                <div class="card booking-form"
                    style="display: flex; gap: 30px; padding: 30px; flex-wrap: wrap; max-width: 1000px; margin: 0 auto; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); border-radius: 12px; background: white;">
                    <div
                        style="flex: 1; min-width: 300px; border-radius: 12px; overflow: hidden; display: flex; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
                        <img src="../images/appointment-banner.jpg" alt="Professional Healthcare"
                            style="width: 100%; height: 100%; object-fit: cover; min-height: 400px;">
                    </div>
                    <form id="appointmentForm"
                        style="flex: 1; min-width: 300px; display: flex; flex-direction: column; justify-content: center;">
                        <div class="input-group">
                            <label for="dept">Select Department</label>
                            <select id="dept" name="department" required>
                                <option value="Cardiology">Cardiology</option>
                                <option value="Neurology">Neurology</option>
                                <option value="Orthopedics">Orthopedics</option>
                                <option value="Pediatrics">Pediatrics</option>
                                <option value="General Medicine">General Medicine</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="doctor">Select Doctor</label>
                            <select id="doctor" name="doctor" required>
                                <option value="Dr. Rao">Dr. Rao (Cardiologist)</option>
                                <option value="Dr. Smith">Dr. Smith (General Physician)</option>
                                <option value="Dr. Williams">Dr. Williams (Neurologist)</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="date">Preferred Date</label>
                            <input type="date" id="date" name="date" required onclick="this.showPicker()"
                                style="cursor: pointer;">
                        </div>
                        <div class="input-group">
                            <label>Available Time Slots</label>
                            <div class="time-slots">
                                <div class="time-slot" data-time="10:00 AM">10:00 AM</div>
                                <div class="time-slot" data-time="10:15 AM">10:15 AM</div>
                                <div class="time-slot selected" data-time="10:30 AM">10:30 AM</div>
                                <div class="time-slot" data-time="10:45 AM">10:45 AM</div>
                                <div class="time-slot" data-time="11:00 AM">11:00 AM</div>
                                <div class="time-slot" data-time="11:15 AM">11:15 AM</div>
                                <div class="time-slot" data-time="11:30 AM">11:30 AM</div>
                                <div class="time-slot" data-time="11:45 AM">11:45 AM</div>
                            </div>
                            <!-- Hidden input to store selected time -->
                            <input type="hidden" id="selectedTime" name="time" value="10:30 AM" required>
                        </div>
                        <button type="submit" class="login-btn">Confirm Appointment</button>
                    </form>
                </div>
            </main>
        </div>
    </div>
    <script src="../js/script.js"></script>
    <script>
        // ENHANCED UI/UX JS
        // Ripple effect
        document.addEventListener('click', function (e) {
            const btn = e.target.closest('button');
            if (btn && !btn.classList.contains('btn-loading')) {
                const circle = document.createElement('span');
                const diameter = Math.max(btn.clientWidth, btn.clientHeight);
                const radius = diameter / 2;
                const rect = btn.getBoundingClientRect();
                circle.style.width = circle.style.height = `${diameter}px`;
                circle.style.left = `${e.clientX - rect.left - radius}px`;
                circle.style.top = `${e.clientY - rect.top - radius}px`;
                circle.classList.add('ripple');
                const ripple = btn.querySelector('.ripple');
                if (ripple) { ripple.remove(); }
                btn.appendChild(circle);
            }
        });

        // Time slot selection
        const slots = document.querySelectorAll('.time-slot');
        slots.forEach(slot => {
            slot.addEventListener('click', function () {
                slots.forEach(s => s.classList.remove('selected'));
                this.classList.add('selected');
                document.getElementById('selectedTime').value = this.dataset.time;
            });
        });

        // Form Loading Simulation
        const form = document.getElementById('appointmentForm');
        if (form) {
            form.addEventListener('submit', function (e) {
                // If there's an existing submit handler in script.js, this will run alongside it.
                const btn = this.querySelector('button[type="submit"]');
                if (!btn) return;
                btn.classList.add('btn-loading');
                // Remove loading state after a delay
                setTimeout(() => {
                    btn.classList.remove('btn-loading');
                }, 1500);
            });
        }
    </script>
</body>

</html>
